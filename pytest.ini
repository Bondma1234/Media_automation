[pytest]
testpaths = tests
pythonpath = .
addopts = -ra --strict-markers --alluredir=output/allure_results
markers =
    p0: 框架和设备可用性用例
    p1: 酷我主流程用例
    p2: 扩展主流程用例
    smoke: 冒烟用例
    media: 媒体应用通用用例
    kuwo: 酷我音乐用例
    manual_auth: 需要扫码、账号、授权或人工确认
    stateful: 会改变收藏、下载、缓存、账号等持久状态
    env_required: 需要特定网络、许可证、账号或地区环境
